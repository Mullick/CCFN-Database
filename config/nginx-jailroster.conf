server {
    listen 80;
    server_name _;          # Replace with your domain or IP if desired

    # Mugshot photos
    location /photos/ {
        alias /var/www/jailroster/photos/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header X-Content-Type-Options nosniff;
    }

    # Reports
    location /reports/ {
        alias /var/www/jailroster/reports/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Optional: simple status page at root
    location / {
        return 200 'Carlton County Jail Roster Server\n';
        add_header Content-Type text/plain;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    access_log /var/log/nginx/jailroster_access.log;
    error_log  /var/log/nginx/jailroster_error.log;
}
