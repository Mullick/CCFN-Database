server {
    listen 80;
    server_name _;

    # Mugshot photos — served directly by nginx
    location /photos/ {
        alias /var/www/jailroster/photos/;
        autoindex off;
        add_header X-Content-Type-Options nosniff;
        expires 7d;
    }

    # Reports directory
    location /reports/ {
        alias /var/www/jailroster/reports/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Everything else — proxy to Flask
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }

    access_log /var/log/nginx/jailroster_access.log;
    error_log  /var/log/nginx/jailroster_error.log;
}
